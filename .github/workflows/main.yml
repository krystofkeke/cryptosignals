name: Crypto signaly 24/7

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Spustit scanner
        run: node scanner.js
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
      - name: Ulozit stav
        run: |
          git config user.name "signals-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json || true
          git commit -m "update state" || echo "beze zmeny"
          git push || echo "nic k pushnuti"
